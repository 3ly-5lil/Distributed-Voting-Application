apiVersion: apps/v1
kind: Deployment

metadata:
  name: vote
  labels:
    app: vote
spec:
  replicas: 2
  
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: dockersamples/examplevotingapp_vote
          ports:
            - name: vote
              containerPort: 80

          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
