apiVersion: apps/v1
kind: Deployment

metadata:
  name: result
  labels:
    app: result
spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: dockersamples/examplevotingapp_result
          ports:
            - name: result
              containerPort: 80

          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
